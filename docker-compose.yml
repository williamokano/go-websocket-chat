services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-1:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://chat:chat@postgres:5432/chat?sslmode=disable"
      REDIS_URL: "redis://valkey:6379"
      JWT_SECRET: "dev-secret-change-in-production"
      RUN_MIGRATE: "true"
      WEBAUTHN_RP_DISPLAY_NAME: "Chat App"
      WEBAUTHN_RP_ID: "localhost"
      WEBAUTHN_RP_ORIGINS: "http://localhost:5173,http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-2:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://chat:chat@postgres:5432/chat?sslmode=disable"
      REDIS_URL: "redis://valkey:6379"
      JWT_SECRET: "dev-secret-change-in-production"
      RUN_MIGRATE: "false"
      WEBAUTHN_RP_DISPLAY_NAME: "Chat App"
      WEBAUTHN_RP_ID: "localhost"
      WEBAUTHN_RP_ORIGINS: "http://localhost:5173,http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy

volumes:
  pgdata:
