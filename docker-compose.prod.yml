# Production docker-compose for Portainer stack deployment.
# Required env vars (set in Portainer stack environment):
#   JWT_SECRET          - Secret key for JWT token signing
#   POSTGRES_PASSWORD   - PostgreSQL password (default: chat)
#   DOCKERHUB_USERNAME  - Docker Hub username for image pulls (default: williamokano)
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat}
      POSTGRES_DB: chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-1:
    image: ${DOCKERHUB_USERNAME:-williamokano}/websocket-chat-backend:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://chat:${POSTGRES_PASSWORD:-chat}@postgres:5432/chat?sslmode=disable"
      REDIS_URL: "redis://valkey:6379"
      JWT_SECRET: "${JWT_SECRET}"
      RUN_MIGRATE: "true"
      WEBAUTHN_RP_DISPLAY_NAME: "Chat App"
      WEBAUTHN_RP_ID: "chat.okano.dev"
      WEBAUTHN_RP_ORIGINS: "https://chat.okano.dev"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-2:
    image: ${DOCKERHUB_USERNAME:-williamokano}/websocket-chat-backend:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://chat:${POSTGRES_PASSWORD:-chat}@postgres:5432/chat?sslmode=disable"
      REDIS_URL: "redis://valkey:6379"
      JWT_SECRET: "${JWT_SECRET}"
      RUN_MIGRATE: "false"
      WEBAUTHN_RP_DISPLAY_NAME: "Chat App"
      WEBAUTHN_RP_ID: "chat.okano.dev"
      WEBAUTHN_RP_ORIGINS: "https://chat.okano.dev"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    image: ${DOCKERHUB_USERNAME:-williamokano}/websocket-chat-frontend:latest
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy

volumes:
  pgdata:
